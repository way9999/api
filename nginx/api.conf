# ============================================================
# API 涓浆绔?Nginx 鍙嶅悜浠ｇ悊閰嶇疆
# 璇峰皢 chat.linuxai.de 鏇挎崲涓轰綘鐨勫疄闄呭煙鍚?# ============================================================

# ---------- HTTP -> HTTPS 寮哄埗璺宠浆 ----------
server {
    listen 80;
    listen [::]:80;
    server_name chat.linuxai.de;

    # 灏嗘墍鏈?HTTP 璇锋眰 301 姘镐箙閲嶅畾鍚戝埌 HTTPS
    return 301 https://$host$request_uri;
}

# ---------- upstream 闀胯繛鎺ユ睜 ----------
upstream newapi {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------- HTTPS 涓绘湇鍔?----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.linuxai.de;

    # ==================== SSL 璇佷功閰嶇疆 ====================
    # 璇佷功鏂囦欢璺緞锛圠et's Encrypt 鑷姩鐢熸垚锛?    ssl_certificate     /etc/letsencrypt/live/chat.linuxai.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.linuxai.de/privkey.pem;

    # ==================== SSL 瀹夊叏鍙傛暟 ====================
    # 浠呭厑璁?TLS 1.2 鍜?TLS 1.3锛岀鐢ㄤ笉瀹夊叏鐨勬棫鐗堟湰
    ssl_protocols TLSv1.2 TLSv1.3;

    # 浣跨敤楂樺己搴﹀姞瀵嗗浠讹紝绂佺敤寮卞姞瀵嗙畻娉?    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # 浼樺厛浣跨敤鏈嶅姟绔殑鍔犲瘑濂椾欢椤哄簭
    ssl_prefer_server_ciphers on;

    # SSL 浼氳瘽缂撳瓨锛屽噺灏戦噸澶嶆彙鎵嬪紑閿€
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 绂佺敤 SSL 浼氳瘽绁ㄦ嵁锛堝寮哄墠鍚戜繚瀵嗘€э級
    ssl_session_tickets off;

    # OCSP Stapling锛氬姞閫熷鎴风璇佷功楠岃瘉
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== 瀹夊叏鍝嶅簲澶?====================
    # HSTS锛氬己鍒舵祻瑙堝櫒鍦?1 骞村唴鍙娇鐢?HTTPS 璁块棶锛堝惈瀛愬煙鍚嶏級
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 绂佹椤甸潰琚祵鍏?iframe锛岄槻姝㈢偣鍑诲姭鎸佹敾鍑?    add_header X-Frame-Options "SAMEORIGIN" always;

    # 绂佹娴忚鍣ㄧ寽娴?MIME 绫诲瀷锛岄槻姝㈠唴瀹瑰梾鎺㈡敾鍑?    add_header X-Content-Type-Options "nosniff" always;

    # 鍚敤娴忚鍣ㄥ唴缃殑 XSS 杩囨护鍣?    add_header X-XSS-Protection "1; mode=block" always;

    # 鎺у埗 Referer 澶寸殑鍙戦€佺瓥鐣ワ紝淇濇姢鐢ㄦ埛闅愮
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== 瀹㈡埛绔姹傞檺鍒?====================
    # 鍏佽涓婁紶鐨勬渶澶ц姹備綋澶у皬锛?00MB锛岄€傜敤浜庡ぇ鏂囦欢涓婁紶鍦烘櫙锛?    client_max_body_size 100m;

    # ==================== 鏃ュ織閰嶇疆 ====================
    # 璁块棶鏃ュ織锛氳褰曟墍鏈夎姹?    access_log /var/log/nginx/api_access.log;

    # 閿欒鏃ュ織锛氳褰曟湇鍔″櫒閿欒
    error_log  /var/log/nginx/api_error.log;

    # ==================== 鍙嶅悜浠ｇ悊鍒板悗绔?API 鏈嶅姟 ====================
    # ==================== Chat UI 闈欐€侀〉闈?====================
    location = /chat {
        return 302 /chat/;
    }

    location ^~ /chat/ {
        alias /opt/api-relay/chat-ui/;
        index index.html;
        charset utf-8;
        try_files $uri $uri/ /chat/index.html;
    }

    # ==================== new-api 棣栭〉娉ㄥ叆 Chat UI 鍏ュ彛 ====================
    location = / {
        proxy_pass http://newapi;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        sub_filter '</body>' '<script src="/chat/home-entry.js?v=20260317-utf8-2"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    location / {
        # 灏嗚姹傝浆鍙戝埌 upstream 闀胯繛鎺ユ睜
        proxy_pass http://newapi;

        # ---------- 浠ｇ悊璇锋眰澶磋缃?----------
        # 浼犻€掑鎴风鐪熷疄 IP 鍦板潃
        proxy_set_header X-Real-IP $remote_addr;

        # 浼犻€掑畬鏁寸殑浠ｇ悊閾?IP 鍒楄〃
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 浼犻€掑師濮嬭姹傚崗璁紙http 鎴?https锛?        proxy_set_header X-Forwarded-Proto $scheme;

        # 浼犻€掑師濮嬭姹傜殑 Host 澶?        proxy_set_header Host $host;

        # ---------- SSE锛圫erver-Sent Events锛夋祦寮忎紶杈撴敮鎸?----------
        # 鍏抽棴浠ｇ悊缂撳啿锛岀‘淇濇祦寮忔暟鎹疄鏃舵帹閫佸埌瀹㈡埛绔?        proxy_buffering off;

        # 鍚敤鍒嗗潡浼犺緭缂栫爜锛屾敮鎸佹祦寮忓搷搴?        chunked_transfer_encoding on;

        # 绂佺敤鍝嶅簲缂撳瓨锛岄伩鍏嶆祦寮忔暟鎹缂撳瓨
        proxy_cache off;

        # ---------- 瓒呮椂璁剧疆 ----------
        # 杩炴帴鍚庣鐨勮秴鏃舵椂闂?        proxy_connect_timeout 60s;

        # 璇诲彇鍚庣鍝嶅簲鐨勮秴鏃舵椂闂达紙璁句负 600 绉掞紝閫傜敤浜庨暱瀵硅瘽鍦烘櫙锛?        proxy_read_timeout 600s;

        # 鍚戝悗绔彂閫佽姹傜殑瓒呮椂鏃堕棿
        proxy_send_timeout 600s;

        # ---------- HTTP/1.1 keepalive ----------
        # 鍚敤 HTTP/1.1 浠ユ敮鎸?upstream keepalive 闀胯繛鎺?        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ==================== SSE 娴佸紡浼犺緭浼樺寲锛?v1/responses锛?====================
    location /v1/responses {
        proxy_pass http://newapi;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # HTTP/1.1 keepalive 鈥?SSE 涓嶉渶瑕?Upgrade锛屾竻绌?Connection 閬垮厤骞叉壈
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 鍏抽棴鎵€鏈夌紦鍐诧紝闄嶄綆 TTFB
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 绂佺敤 Nagle 绠楁硶锛孲SE 灏忓寘绔嬪嵆鍙戦€?        tcp_nodelay on;

        # 瓒呮椂璁剧疆
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # keepalive 鐣ュぇ浜?proxy_read_timeout锛屼繚鎸佽繛鎺ュ鐢?        keepalive_timeout 620s;
    }

    # ==================== Resin 浠ｇ悊姹犵鐞嗛潰鏉?====================
    # 璁块棶鍦板潃: https://chat.linuxai.de/resin/
    # 鑷甫 RESIN_ADMIN_TOKEN 瀵嗙爜淇濇姢
    location /resin/ {
        proxy_pass http://127.0.0.1:2260/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # ==================== Antigravity 璐﹀彿绠＄悊闈㈡澘 ====================
    # 璁块棶鍦板潃: https://chat.linuxai.de/antigravity/
    # 鑷甫 API_KEY / WEB_PASSWORD 瀵嗙爜淇濇姢
    location /antigravity/ {
        proxy_pass http://127.0.0.1:9100/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}

