# ============================================================
# GPT 注册机 Dashboard — register.linuxai.de
# 反向代理到 gpt-register 容器 :9005
# ============================================================

# ---------- HTTP -> HTTPS 强制跳转 ----------
server {
    listen 80;
    listen [::]:80;
    server_name register.linuxai.de;

    return 301 https://$host$request_uri;
}

# ---------- HTTPS 主服务 ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name register.linuxai.de;

    # ==================== SSL 证书配置 ====================
    ssl_certificate     /etc/letsencrypt/live/register.linuxai.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/register.linuxai.de/privkey.pem;

    # ==================== SSL 安全参数 ====================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ==================== 安全响应头 ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== 客户端请求限制 ====================
    client_max_body_size 10m;

    # ==================== 日志 ====================
    access_log /var/log/nginx/register_access.log;
    error_log  /var/log/nginx/register_error.log;

    # ==================== 反向代理到 gpt-register dashboard ====================
    location / {
        proxy_pass http://127.0.0.1:9005;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ==================== WebSocket 支持（实时日志推送） ====================
    location /ws/ {
        proxy_pass http://127.0.0.1:9005;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket 升级
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}